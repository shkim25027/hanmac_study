<!doctype html>
<html lang="ko">
  <head>
    @@include("_include/_head.html")
    <link rel="stylesheet" type="text/css" href="./assets/css/main.css" />
  </head>
  <body>
    <div class="wrap myclass myclass-mobile" data-name="마이클래스 > 목표설정">
      <!-- 모바일 전용 헤더 (Figma: 360px, 녹색 그라디언트) -->
      <header class="mobile-header">
        <div class="mobile-header-bg"></div>
        <a href="./index.html" class="mobile-logo" aria-label="배움터 홈">
          <img src="http://localhost:3845/assets/1910c19095172e6482df7b51b8db5c49db75be69.svg" alt="" class="logo-union" />
          <img src="http://localhost:3845/assets/839ecff4e2159e377ca8ea0a35d6be6a6029c225.svg" alt="" class="logo-symbol" />
        </a>
        <div class="mobile-header-actions">
          <button type="button" class="btn-icon btn-search" title="검색" aria-label="검색"></button>
          <button type="button" class="btn-icon btn-alert on" title="알림" aria-label="알림">
            <span class="alert-dot" aria-hidden="true"></span>
          </button>
          <button type="button" class="btn-icon btn-menu" title="메뉴" aria-label="메뉴"></button>
        </div>
      </header>

      <div class="mobile-container">
        <!-- 배경 + 나뭇잎 오버레이 -->
        <div class="mobile-bg">
          <img src="http://localhost:3845/assets/2510c59624ba29987d9ebdca888d1bee5c44fed6.svg" alt="" class="mobile-bg-svg" />
        </div>
        <div class="mobile-bg-leaves" aria-hidden="true">
          <img src="http://localhost:3845/assets/aeb88a35efc6d9f54393e86b3eb92887db502853.png" alt="" />
        </div>

        <!-- 타이틀 영역 -->
        <div class="mobile-goal-intro">
          <p class="mobile-dday">D-64</p>
          <p class="mobile-goal-copy">선택한 목표와 함께 배움을 채워가세요.</p>
          <p class="mobile-quarter">26년 <strong>3</strong>분기)</p>
        </div>

        <!-- 목표 카드 그리드 (3행 x 2열) + 선반 -->
        <section class="mobile-bookshelf" id="mobileBookshelf" aria-label="학습 목표 선택">
          <!-- 1행 -->
          <div class="mobile-shelf-row">
            <ul class="mobile-goal-list">
              <li class="mobile-goal-item">
                <button type="button" class="mobile-goal-card" aria-label="자기이해와 강점 찾기 목표 선택">
                  <span class="mobile-card-bars" aria-hidden="true">
                    <span class="mobile-bar" style="height: 71%"></span>
                    <span class="mobile-bar" style="height: 74%"></span>
                    <span class="mobile-bar" style="height: 79%"></span>
                    <span class="mobile-bar" style="height: 79%"></span>
                    <span class="mobile-bar" style="height: 74%"></span>
                    <span class="mobile-bar" style="height: 84%"></span>
                  </span>
                  <span class="mobile-card-overlay"></span>
                  <span class="mobile-card-icon">
                    <img src="http://localhost:3845/assets/d46a31cc87ad6c880262d0b3e13d6fe5f8b1e2c2.png" alt="" />
                  </span>
                  <strong class="mobile-card-title">자기이해와<br />강점 찾기</strong>
                </button>
              </li>
              <li class="mobile-goal-item">
                <button type="button" class="mobile-goal-card" aria-label="효과적인 의사소통 배우기 목표 선택">
                  <span class="mobile-card-bars" aria-hidden="true">
                    <span class="mobile-bar" style="height: 71%"></span>
                    <span class="mobile-bar" style="height: 74%"></span>
                    <span class="mobile-bar" style="height: 79%"></span>
                    <span class="mobile-bar" style="height: 79%"></span>
                    <span class="mobile-bar" style="height: 74%"></span>
                    <span class="mobile-bar" style="height: 84%"></span>
                  </span>
                  <span class="mobile-card-overlay"></span>
                  <span class="mobile-card-icon">
                    <img src="http://localhost:3845/assets/137483f3a36aff22b7ab80cee3274d335e78e18e.png" alt="" />
                  </span>
                  <strong class="mobile-card-title">효과적인<br />의사소통 배우기</strong>
                </button>
              </li>
            </ul>
            <div class="mobile-shelf-board"></div>
          </div>
          <!-- 2행 -->
          <div class="mobile-shelf-row">
            <ul class="mobile-goal-list">
              <li class="mobile-goal-item">
                <button type="button" class="mobile-goal-card" aria-label="감정 조절과 자기관리 목표 선택">
                  <span class="mobile-card-bars" aria-hidden="true">
                    <span class="mobile-bar" style="height: 71%"></span>
                    <span class="mobile-bar" style="height: 74%"></span>
                    <span class="mobile-bar" style="height: 80%"></span>
                    <span class="mobile-bar" style="height: 80%"></span>
                    <span class="mobile-bar" style="height: 74%"></span>
                    <span class="mobile-bar" style="height: 84%"></span>
                  </span>
                  <span class="mobile-card-overlay"></span>
                  <span class="mobile-card-icon">
                    <img src="http://localhost:3845/assets/a4c45b8cea5ebb061a3b64d53675d9660294b8b1.png" alt="" />
                  </span>
                  <strong class="mobile-card-title">감정 조절과<br />자기관리</strong>
                </button>
              </li>
              <li class="mobile-goal-item">
                <button type="button" class="mobile-goal-card" aria-label="비판적 사고와 문제 해결 목표 선택">
                  <span class="mobile-card-bars" aria-hidden="true">
                    <span class="mobile-bar" style="height: 71%"></span>
                    <span class="mobile-bar" style="height: 74%"></span>
                    <span class="mobile-bar" style="height: 80%"></span>
                    <span class="mobile-bar" style="height: 80%"></span>
                    <span class="mobile-bar" style="height: 74%"></span>
                    <span class="mobile-bar" style="height: 84%"></span>
                  </span>
                  <span class="mobile-card-overlay"></span>
                  <span class="mobile-card-icon">
                    <img src="http://localhost:3845/assets/4a55daf31a83bda2d371850d614818ee3f94dfdc.png" alt="" />
                  </span>
                  <strong class="mobile-card-title">비판적 사고와<br />문제 해결</strong>
                </button>
              </li>
            </ul>
            <div class="mobile-shelf-board"></div>
          </div>
          <!-- 3행 -->
          <div class="mobile-shelf-row">
            <ul class="mobile-goal-list">
              <li class="mobile-goal-item">
                <button type="button" class="mobile-goal-card" aria-label="협업과 팀워크 기르기 목표 선택">
                  <span class="mobile-card-bars" aria-hidden="true">
                    <span class="mobile-bar" style="height: 74%"></span>
                    <span class="mobile-bar" style="height: 77%"></span>
                    <span class="mobile-bar" style="height: 82%"></span>
                    <span class="mobile-bar" style="height: 82%"></span>
                    <span class="mobile-bar" style="height: 77%"></span>
                    <span class="mobile-bar" style="height: 87%"></span>
                  </span>
                  <span class="mobile-card-overlay"></span>
                  <span class="mobile-card-icon">
                    <img src="http://localhost:3845/assets/2c8d5bdfcdaf41fec47e4457480bf10d0299f654.png" alt="" />
                  </span>
                  <strong class="mobile-card-title">협업과<br />팀워크 기르기</strong>
                </button>
              </li>
              <li class="mobile-goal-item">
                <button type="button" class="mobile-goal-card" aria-label="커리어 탐색과 역량 개발 목표 선택">
                  <span class="mobile-card-bars" aria-hidden="true">
                    <span class="mobile-bar" style="height: 74%"></span>
                    <span class="mobile-bar" style="height: 77%"></span>
                    <span class="mobile-bar" style="height: 82%"></span>
                    <span class="mobile-bar" style="height: 82%"></span>
                    <span class="mobile-bar" style="height: 77%"></span>
                    <span class="mobile-bar" style="height: 87%"></span>
                  </span>
                  <span class="mobile-card-overlay"></span>
                  <span class="mobile-card-icon">
                    <img src="http://localhost:3845/assets/d46a31cc87ad6c880262d0b3e13d6fe5f8b1e2c2.png" alt="" />
                  </span>
                  <strong class="mobile-card-title">커리어 탐색과<br />역량 개발</strong>
                </button>
              </li>
            </ul>
            <div class="mobile-shelf-board"></div>
          </div>
        </section>

        <!-- 하단 추천 강의 카드 (플로팅) -->
        <div class="mobile-floating-card">
          <div class="mobile-floating-card-inner">
            <div class="mobile-floating-thumb">
              <img src="http://localhost:3845/assets/88686cddd3a4eef62421a8eccd5f66d2d373a05e.png" alt="" />
            </div>
            <div class="mobile-floating-body">
              <span class="mobile-floating-badge">리더십</span>
              <h3 class="mobile-floating-title">정선근 교수가 알려주는 목디스크 치료 운동</h3>
              <p class="mobile-floating-meta">
                <span>마인드셋</span>
                <span>중간관리자</span>
              </p>
            </div>
          </div>
        </div>

        <!-- 페이지네이션 -->
        <p class="mobile-pagination" aria-label="페이지 위치">
          <strong>1</strong> / 26
        </p>
      </div>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', function () {
        var cards = document.querySelectorAll('.mobile-goal-card');
        cards.forEach(function (btn) {
          btn.addEventListener('click', function () {
            var label = btn.getAttribute('aria-label') || '';
            if (label) console.log('목표 선택:', label);
            // 필요 시 목표 상세 레이어 열기 등 연동
          });
        });
      });
    </script>
  </body>
</html>
