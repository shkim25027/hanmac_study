<!doctype html>
<html lang="ko">
  <head>
    @@include("_include/_head.html")
    <link rel="stylesheet" type="text/css" href="./assets/css/main.css" />
  </head>
  <body>
    <div class="wrap myclass">
      @@include("_include/_header.html")

      <div class="container">
        <div class="myclass-wrap">

          <!-- 상단바: 좌(사용자/연도) + 우(환영 문구) -->
          <div class="myclass-top-bar">
            <div class="top-bar-left">
              <div class="user-rank-area">
                <div class="user-rank-area-inner">
                  <div class="user-profile">
                    <img src="./assets/images/insight/profile.png" alt="프로필 이미지" />
                  </div>
                  <span class="rank-text">홍길동님 현재 <em>1250</em>등</span>
                </div>               
                <div class="rank-toggle-wrap">
                  <button class="btn-rank-toggle" type="button" aria-label="순위 상세 보기" aria-expanded="false" aria-controls="rankListPopup">
                    <span class="ico-trophy" aria-hidden="true">
                      <img src="./assets/images/myclass/ico_trophy.png" alt="트로피 아이콘" />
                    </span>
                    <span class="ico-chevron-down" aria-hidden="true"></span>
                  </button>
                  <div class="rank-list-popup" id="rankListPopup" role="region" aria-label="순위 목록" hidden>
                    <ul class="rank-list">
                      <li class="rank-item rank-1">
                        <span class="rank-medal rank-gold" aria-hidden="true">
                          <img src="./assets/images/myclass/ico_medal_gold.png" alt="금메달 아이콘" />
                        </span>
                        <span class="rank-name">박길동 <small>(바론컨설턴트)</small></span>
                      </li>
                      <li class="rank-item rank-2">
                        <span class="rank-medal rank-silver" aria-hidden="true">
                          <img src="./assets/images/myclass/ico_medal_silver.png" alt="은메달 아이콘" />
                        </span>
                        <span class="rank-name">홍길동 <small>(한맥기술)</small></span>
                      </li>
                      <li class="rank-item rank-3">
                        <span class="rank-medal rank-bronze" aria-hidden="true">
                          <img src="./assets/images/myclass/ico_medal_bronze.png" alt="동메달 아이콘" />
                        </span>
                        <span class="rank-name">김철수 <small>(삼안)</small></span>
                      </li>
                      <li class="rank-item rank-4">
                        <span class="rank-num">4.</span>
                        <span class="rank-name">박철수 <small>(바른컨설턴트)</small></span>
                      </li>
                      <li class="rank-item rank-5">
                        <span class="rank-num">5.</span>
                        <span class="rank-name">김영희 <small>(한맥기술)</small></span>
                      </li>
                    </ul>
                  </div>
                </div>
              </div>
              <div class="year-selector">
                <button class="btn-year" type="button" id="btnYearToggle" aria-haspopup="listbox" aria-expanded="false" aria-controls="yearListPopup">
                  <span>
                    <span class="year-display">20<strong>26</strong></span><small>년</small>
                  </span>
                  <i class="ico-year-arrow" aria-hidden="true"></i>
                </button>
                <div class="year-list-wrap" id="yearListPopup" role="listbox" aria-label="연도 선택" hidden>
                  <ul class="year-list">
                    <li class="year-item"><button type="button" class="year-option" data-year="2026">2026년</button></li>
                    <li class="year-item"><button type="button" class="year-option" data-year="2025">2025년</button></li>
                    <li class="year-item"><button type="button" class="year-option" data-year="2024">2024년</button></li>
                    <li class="year-item"><button type="button" class="year-option" data-year="2023">2023년</button></li>
                  </ul>
                </div>
              </div>
            </div>
            <div class="page-intro" id="pageIntro">
              <!-- 상태 1: 목표 미설정 -->
              <div class="page-title" data-state="initial">
                <h3><em>홍길동 선임연구원</em>님, <strong>학습 목표</strong>를 골라볼까요?</h3>
                <p ><em>D-64<small>(3월 30일)</small> 까지 선택한 목표</em>와 함께 배움을 채워가세요.</p>
              </div>
            </div>
          </div>


          <!-- 책장 -->
          <section class="bookshelf goal" id="bookshelf" aria-label="학습 목표 선택">
            <div class="shelf-legs">
              <span class="shelf-leg shelf-leg-left"></span>
              <span class="shelf-leg shelf-leg-center"></span>
              <span class="shelf-leg shelf-leg-center"></span>
              <span class="shelf-leg shelf-leg-center"></span>
              <span class="shelf-leg shelf-leg-right"></span>
            </div>
            <!-- 1행 -->
            <div class="shelf-row">
              <ul class="goal-list">
                <li class="goal-item" data-goal-id="1">
                  <button class="goal-card" type="button" aria-label="자기이해와 강점 찾기 목표 선택">
                    <div class="card-default-area">
                      <div class="card-title-wrap">
                        <div class="card-icon-wrap">
                          <span class="card-icon" aria-hidden="true">
                            <img src="./assets/images/myclass/icon_self.png" alt="자기이해와 강점 찾기 아이콘">
                          </span>
                        </div>
                        <strong class="card-title">자기이해와 강점 찾기</strong>
                      </div>
                      <div class="card-body">
                        <p class="card-desc">나의 성향, 가치관, 강점 등을 탐색하고 <br>이해하며 자기인식을 높이는 과정</p>
                      </div>
                    </div>
                  </button>
                </li>

                <li class="goal-item" data-goal-id="2">
                  <button class="goal-card" type="button" aria-label="효과적인 의사소통 배우기 목표 선택">
                    
                    <div class="card-default-area">
                      <div class="card-title-wrap">
                        <div class="card-icon-wrap">
                          <span class="card-icon" aria-hidden="true">
                            <img src="./assets/images/myclass/icon_communication.png" alt="효과적인 의사소통 배우기 아이콘">
                          </span>
                        </div>
                        <strong class="card-title">효과적인<br>의사소통 배우기</strong>
                      </div>
                      <div class="card-body">
                        <p class="card-desc">상황에 맞는 말하기와 경청을 통해 타인과 원활하게 소통하는 방법을 익히는 과정</p>
                      </div>
                    </div>
                  </button>
                </li>

                <li class="goal-item" data-goal-id="3">
                  <button class="goal-card" type="button" aria-label="감정 조절과 자기관리 목표 선택">
                    
                    <div class="card-default-area">
                      <div class="card-title-wrap">
                        <div class="card-icon-wrap">
                          <span class="card-icon" aria-hidden="true">
                            <img src="./assets/images/myclass/icon_emotion.png" alt="감정 조절과 자기관리 아이콘">
                          </span>
                        </div>
                        <strong class="card-title">감정 조절과 자기관리</strong>
                      </div>
                      <div class="card-body">
                        <p class="card-desc">다양한 감정을 인식하고 조절하여 안정적인 삶을 유지하는 자기관리 훈련 과정</p>
                      </div>
                    </div>
                  </button>
                </li>

                <li class="goal-item" data-goal-id="4">
                  <button class="goal-card" type="button" aria-label="목표 설정과 시간 관리 목표 선택">
                    
                    <div class="card-default-area">
                      <div class="card-title-wrap">
                        <div class="card-icon-wrap">
                          <span class="card-icon" aria-hidden="true">
                            <img src="./assets/images/myclass/icon_time.png" alt="목표 설정과 시간 관리 아이콘">
                          </span>
                        </div>
                        <strong class="card-title">목표 설정과 시간 관리</strong>
                      </div>
                      <div class="card-body">
                        <p class="card-desc">실현 가능한 목표를 세우고 계획적으로 시간을 활용하는 습관을 기르는 과정</p>
                      </div>
                    </div>
                  </button>
                </li>
              </ul>

              <div class="shelf-board"></div>
            </div>
            <!-- // 1행 -->

            <!-- 2행 -->
            <div class="shelf-row">
              <ul class="goal-list">
                <li class="goal-item" data-goal-id="5">
                  <button class="goal-card" type="button" aria-label="디지털 리터러시와 정보 활용 목표 선택">
                    
                    <div class="card-default-area">
                      <div class="card-title-wrap">
                        <div class="card-icon-wrap">
                          <span class="card-icon" aria-hidden="true">
                            <img src="./assets/images/myclass/icon_digital.png" alt="디지털 리터러시와 정보 활용 아이콘">
                          </span>
                        </div>
                        <strong class="card-title">디지털 리터러시와<br>정보 활용</strong>
                      </div>
                      <div class="card-body">
                        <p class="card-desc">디지털 환경에서 정보를 바르게 찾고 활용하는 능력과 온라인 소양을 기르는 과정</p>
                      </div>
                    </div>
                  </button>
                </li>

                <li class="goal-item" data-goal-id="6">
                  <button class="goal-card" type="button" aria-label="비판적 사고와 문제 해결 목표 선택">
                    
                    <div class="card-default-area">
                      <div class="card-title-wrap">
                        <div class="card-icon-wrap">
                          <span class="card-icon" aria-hidden="true">
                            <!-- 전구 아이콘 -->
                            <img src="./assets/images/myclass/icon_critical.png" alt="비판적 사고와 문제 해결 아이콘" >
                          </span>
                        </div>
                        <strong class="card-title">비판적 사고와 문제 해결</strong>
                      </div>
                      <div class="card-body">
                        <p class="card-desc">다양한 관점에서 생각하고 문제 상황을 논리적으로 해결하는 능력을 기르는 과정</p>
                      </div>
                    </div>
                  </button>
                </li>

                <li class="goal-item" data-goal-id="7">
                  <button class="goal-card" type="button" aria-label="협업과 팀워크 기르기 목표 선택">
                    
                    <div class="card-default-area">
                      <div class="card-title-wrap">
                        <div class="card-icon-wrap">
                          <span class="card-icon" aria-hidden="true">
                            <img src="./assets/images/myclass/icon_collaboration.png" alt="협업과 팀워크 기르기 아이콘">
                          </span>
                        </div>
                        <strong class="card-title">협업과 팀워크 기르기</strong>
                      </div>
                      <div class="card-body">
                        <p class="card-desc">타인과 협력하며 공동의 목표를 위해 함께 노력하는 태도와 기술을 기르는 과정</p>
                      </div>
                    </div>
                  </button>
                </li>

                <li class="goal-item" data-goal-id="8">
                  <button class="goal-card" type="button" aria-label="커리어 탐색과 역량 개발 목표 선택">
                    
                    <div class="card-default-area">
                      <div class="card-title-wrap">
                        <div class="card-icon-wrap">
                          <span class="card-icon" aria-hidden="true">
                            <img src="./assets/images/myclass/icon_career.png" alt="커리어 탐색과 역량 개발 아이콘">
                          </span>
                        </div>
                        <strong class="card-title">커리어 탐색과 역량 개발</strong>
                      </div>
                      <div class="card-body">
                        <p class="card-desc">직무와 산업의 흐름을 이해하고, 자신의 커리어 방향성과 필요한 역량을 점검·계획하는 과정</p>
                      </div>
                    </div>
                  </button>
                </li>
              </ul>

              <div class="shelf-board"></div>
            </div>
            <!-- // 2행 -->

          </section>
          <!-- // 책장 -->

        </div>
      </div>
      <!-- // container -->

      <!-- 목표 상세 팝업 레이어 (공용) -->
      @@include("_modal/goal-layer.html")

    </div>
    <!-- // wrap.myclass -->

    <script>
    document.addEventListener('DOMContentLoaded', function () {

      // ====================================================
      // 순위 목록 토글
      // ====================================================
      const btnRankToggle = document.querySelector('.btn-rank-toggle');
      const rankListPopup = document.getElementById('rankListPopup');

      if (btnRankToggle && rankListPopup) {
        btnRankToggle.addEventListener('click', function () {
          const isOpen = this.classList.toggle('is-open');
          rankListPopup.hidden = !isOpen;
          this.setAttribute('aria-expanded', isOpen);
        });

        document.addEventListener('click', function (e) {
          if (btnRankToggle.classList.contains('is-open') &&
              !btnRankToggle.contains(e.target) &&
              !rankListPopup.contains(e.target)) {
            btnRankToggle.classList.remove('is-open');
            rankListPopup.hidden = true;
            btnRankToggle.setAttribute('aria-expanded', 'false');
          }
        });
      }

      // ====================================================
      // 연도 선택 셀렉트
      // ====================================================
      const btnYearToggle = document.getElementById('btnYearToggle');
      const yearListPopup = document.getElementById('yearListPopup');
      const yearDisplay = document.querySelector('.year-display');
      const yearDisplayStrong = yearDisplay?.querySelector('strong');

      function setYearDisplay(year) {
        if (!yearDisplay || !yearDisplayStrong) return;
        const prefix = String(year).slice(0, -2);
        const suffix = String(year).slice(-2);
        const textNode = Array.from(yearDisplay.childNodes).find(function (n) { return n.nodeType === Node.TEXT_NODE; });
        if (textNode) {
          textNode.textContent = prefix;
        } else {
          yearDisplay.insertBefore(document.createTextNode(prefix), yearDisplayStrong);
        }
        yearDisplayStrong.textContent = suffix;
      }

      function closeYearSelect() {
        if (btnYearToggle) {
          btnYearToggle.classList.remove('is-open');
          btnYearToggle.setAttribute('aria-expanded', 'false');
        }
        if (yearListPopup) yearListPopup.hidden = true;
      }

      if (btnYearToggle && yearListPopup && yearDisplay) {
        btnYearToggle.addEventListener('click', function () {
          const isOpen = this.classList.toggle('is-open');
          yearListPopup.hidden = !isOpen;
          this.setAttribute('aria-expanded', isOpen);
        });

        yearListPopup.querySelectorAll('.year-option').forEach(function (opt) {
          opt.addEventListener('click', function () {
            const year = this.dataset.year;
            setYearDisplay(year);
            closeYearSelect();
          });
        });

        document.addEventListener('click', function (e) {
          if (btnYearToggle.classList.contains('is-open') &&
              !btnYearToggle.contains(e.target) &&
              !yearListPopup.contains(e.target)) {
            closeYearSelect();
          }
        });
      }

      // ====================================================
      // 목표 데이터
      // ====================================================
      const goals = [
        {
          id: 1,
          title: '자기이해와 강점 찾기',
          desc: '나의 성향, 가치관, 강점 등을 탐색하고 이해하며 자기인식을 높이는 과정',
        },
        {
          id: 2,
          title: '효과적인 의사소통 배우기',
          desc: '상황에 맞는 말하기와 경청을 통해 타인과 원활하게 소통하는 방법을 익히는 과정',
        },
        {
          id: 3,
          title: '감정 조절과 자기관리',
          desc: '다양한 감정을 인식하고 조절하여 안정적인 삶을 유지하는 자기관리 훈련 과정',
        },
        {
          id: 4,
          title: '목표 설정과 시간 관리',
          desc: '실현 가능한 목표를 세우고 계획적으로 시간을 활용하는 습관을 기르는 과정',
        },
        {
          id: 5,
          title: '디지털 리터러시와 정보 활용',
          desc: '디지털 환경에서 정보를 바르게 찾고 활용하는 능력과 온라인 소양을 기르는 과정',
        },
        {
          id: 6,
          title: '비판적 사고와 문제 해결',
          desc: '다양한 관점에서 생각하고 문제 상황을 논리적으로 해결하는 능력을 기르는 과정',
        },
        {
          id: 7,
          title: '협업과 팀워크 기르기',
          desc: '타인과 협력하며 공동의 목표를 위해 함께 노력하는 태도와 기술을 기르는 과정',
        },
        {
          id: 8,
          title: '커리어 탐색과 역량 개발',
          desc: '직무와 산업의 흐름을 이해하고, 자신의 커리어 방향성과 필요한 역량을 점검·계획하는 과정',
        },
      ];

      let currentGoalId = null;
      let selectedGoalId = null;

      const goalLayer        = document.getElementById('goalLayer');
      const btnCloseLayer    = document.getElementById('btnCloseLayer');
      const btnSetGoal        = document.getElementById('btnSetGoal');
      const btnSelectGoal     = document.getElementById('btnSelectGoal');
      const goalSlideWrapper  = document.getElementById('goalSlideWrapper');
      const goalThumbsWrapper = document.getElementById('goalThumbsWrapper');
      const popupPagination   = document.getElementById('popupPagination');

      let goalPopupSwiper  = null;
      let goalThumbsSwiper = null;

      // 목표별 카드 배경색 (비활성 슬라이드용)
      const goalCardColors = {
        1: '#46B8A5',
        2: '#3EAEBC',
        3: '#46B8A5',
        4: '#3B9EAC',
        5: '#3EB09C',
        6: '#42ACBA',
        7: '#3DAE9E',
        8: '#40B2A2',
      };

      function buildGoalSlides() {
        const templateSlide = goalSlideWrapper && goalSlideWrapper.querySelector('.goal-slide');
        if (!templateSlide) return;

        for (let i = 1; i < goals.length; i++) {
          const clone = templateSlide.cloneNode(true);
          clone.dataset.goalId = goals[i].id;
          clone.classList.remove('swiper-slide-active', 'swiper-slide-prev', 'swiper-slide-next');
          goalSlideWrapper.appendChild(clone);
        }

        goals.forEach(function (goal) {
          const slide = goalSlideWrapper.querySelector(`.goal-slide[data-goal-id="${goal.id}"]`);
          const goalItem = document.querySelector(`.goal-item[data-goal-id="${goal.id}"]`);
          if (!slide) return;

          // 비활성 슬라이드 카드 배경색 CSS 변수 주입
          const color = goalCardColors[goal.id] || '#46B8A5';
          slide.style.setProperty('--card-color-1', color);

          const titleEl = slide.querySelector('.goal-slide-title');
          const descEl  = slide.querySelector('.goal-slide-desc');
          const iconEl  = slide.querySelector('.goal-slide-icon');
          if (titleEl) titleEl.textContent = goal.title;
          if (descEl)  descEl.textContent  = goal.desc;
          if (iconEl && goalItem) {
            const cardIcon = goalItem.querySelector('.card-icon');
            iconEl.innerHTML = cardIcon ? cardIcon.innerHTML : '';
          }
        });
      }

      function buildGoalThumbs() {
        const templateThumb = goalThumbsWrapper && goalThumbsWrapper.querySelector('.goal-thumb');
        if (!templateThumb) return;
        for (let i = 1; i < goals.length; i++) {
          const clone = templateThumb.cloneNode(true);
          clone.dataset.goalId = goals[i].id;
          clone.classList.remove('swiper-slide-active', 'swiper-slide-thumb-active');
          goalThumbsWrapper.appendChild(clone);
        }
        goals.forEach(function (goal) {
          const thumb = goalThumbsWrapper.querySelector(`.goal-thumb[data-goal-id="${goal.id}"]`);
          if (!thumb) return;
          const titleEl = thumb.querySelector('.goal-thumb-title');
          if (titleEl) titleEl.textContent = goal.title;
        });
      }

      function initGoalPopupSwiper() {
        if (goalPopupSwiper) return;

        goalThumbsSwiper = new Swiper('.goal-popup-thumbs-swiper', {
          spaceBetween: 8,
          slidesPerView: 'auto',
          watchSlidesProgress: true,
          slideToClickedSlide: true,
          breakpoints: {
            320: { slidesPerView: 2 },
            640: { slidesPerView: 3 },
            900: { slidesPerView: 4 },
            1200: { slidesPerView: 5 },
          },
        });

        goalPopupSwiper = new Swiper('.goal-popup-swiper', {
          slidesPerView: 1,
          spaceBetween: 0,
          thumbs: {
            swiper: goalThumbsSwiper,
          },
          observer: true,
          observeParents: true,
          pagination: {
            el: '#popupPagination',
            clickable: true,
            bulletClass: 'pagination-dot',
            bulletActiveClass: 'is-active',
          },
          on: {
            slideChange: function () {
              const idx = this.activeIndex;
              currentGoalId = goals[idx] ? goals[idx].id : currentGoalId;
            },
          },
        });
      }

      function destroyGoalPopupSwiper() {
        if (goalPopupSwiper) {
          goalPopupSwiper.destroy(true, true);
          goalPopupSwiper = null;
        }
        if (goalThumbsSwiper) {
          goalThumbsSwiper.destroy(true, true);
          goalThumbsSwiper = null;
        }
      }

      function openGoalLayer(goalId) {
        currentGoalId = goalId;
        goalLayer.removeAttribute('aria-hidden');
        goalLayer.classList.remove('hidden');
        goalLayer.classList.add('is-open');
        document.body.classList.add('layer-open');
        buildGoalSlides();
        buildGoalThumbs();
        initGoalPopupSwiper();
        const slideIdx = goals.findIndex(g => g.id === goalId);
        if (slideIdx >= 0 && goalPopupSwiper) {
          goalPopupSwiper.slideTo(slideIdx, 0);
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              if (goalPopupSwiper) {
                goalPopupSwiper.updateSize();
                goalPopupSwiper.updateSlides();
                goalPopupSwiper.slideTo(slideIdx, 0);
              }
            });
          });
        }
        btnCloseLayer.focus();
      }

      function closeGoalLayer() {
        destroyGoalPopupSwiper();
        if (goalSlideWrapper) {
          const slides = goalSlideWrapper.querySelectorAll('.goal-slide');
          slides.forEach(function (s, i) { if (i > 0) s.remove(); });
        }
        if (goalThumbsWrapper) {
          const thumbs = goalThumbsWrapper.querySelectorAll('.goal-thumb');
          thumbs.forEach(function (t, i) { if (i > 0) t.remove(); });
        }
        goalLayer.setAttribute('aria-hidden', 'true');
        goalLayer.classList.remove('is-open');
        goalLayer.classList.add('hidden');
        document.body.classList.remove('layer-open');
      }

      // ====================================================
      // 목표 설정하기
      // ====================================================
      btnSetGoal.addEventListener('click', function () {
        selectedGoalId = currentGoalId;
        closeGoalLayer();
        applySelectedState(selectedGoalId);
      });

      // ====================================================
      // 선택 후 상태 적용
      // ====================================================
      const selectedGoalSection = document.getElementById('selectedGoalSection');
      const selectedGoalTitle = document.getElementById('selectedGoalTitle');

      function applySelectedState(goalId) {
        const goal = goals.find(g => g.id === goalId);

        document.querySelectorAll('.goal-item').forEach(function (item) {
          item.classList.remove('is-selected');
          const defaultArea = item.querySelector('.card-default-area');
          if (defaultArea) defaultArea.hidden = false;
        });

        // 선택된 카드 숨김 (상단 책장 섹션으로 대체)
        const selectedItem = document.querySelector(`.goal-item[data-goal-id="${goalId}"]`);
        if (selectedItem) {
          selectedItem.classList.add('is-selected');
          selectedItem.hidden = true;
        }

        // 선택된 목표 책장 섹션 표시
        if (selectedGoalSection && selectedGoalTitle && goal) {
          selectedGoalTitle.textContent = goal.title;
          selectedGoalSection.classList.remove('hidden');
          selectedGoalSection.hidden = false;
        }

        // 인트로 텍스트 변경
        document.querySelectorAll('.intro-state').forEach(function (el) {
          const isDone = el.classList.contains('intro-state--done');
          el.hidden = !isDone;
          el.classList.toggle('hidden', !isDone);
        });

        if (btnSelectGoal) btnSelectGoal.textContent = '추가 목표 고르기';
        document.getElementById('bookshelf').classList.add('has-selected');
      }

      // ====================================================
      // 카드 클릭 이벤트
      // ====================================================
      document.querySelectorAll('.goal-card').forEach(function (card) {
        card.addEventListener('click', function () {
          const item   = card.closest('.goal-item');
          const goalId = parseInt(item.dataset.goalId, 10);
          openGoalLayer(goalId);
        });
      });

      if (btnSelectGoal) {
        btnSelectGoal.addEventListener('click', function () {
          const firstAvailable = selectedGoalId
            ? goals.find(g => g.id !== selectedGoalId)
            : goals[0];
          if (firstAvailable) openGoalLayer(firstAvailable.id);
        });
      }

      // ====================================================
      // 닫기 버튼 / 배경 클릭
      // ====================================================
      btnCloseLayer.addEventListener('click', closeGoalLayer);

      goalLayer.addEventListener('click', function (e) {
        if (e.target === goalLayer) closeGoalLayer();
      });

      // ESC 키
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && goalLayer.classList.contains('is-open')) {
          closeGoalLayer();
        }
      });

    }); // DOMContentLoaded
    </script>

  </body>
</html>
